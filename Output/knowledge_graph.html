
<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        #mynetwork { width: 100%; height: 750px; border: 1px solid #334155; border-radius: 8px; }
        h2 { text-align: center; color: #38bdf8; }
    </style>
</head>
<body>
    <h2>Security Knowledge Graph</h2>
    <div id="mynetwork"></div>
    <script type="text/javascript">
        var nodes = new vis.DataSet([{"id": "MANALI-IDEAPADF$", "label": "MANALI-IDEAPADF$", "group": "user", "color": "#38bdf8", "title": "User: MANALI-IDEAPADF$"}, {"id": "nan", "label": "nan", "group": "ip", "color": "#22c55e", "title": "IP: nan"}, {"id": "manalishanbhag@outlook.com", "label": "manalishanbhag@outlook.com", "group": "user", "color": "#38bdf8", "title": "User: manalishanbhag@outlook.com"}, {"id": "127.0.0.1", "label": "127.0.0.1", "group": "ip", "color": "#22c55e", "title": "IP: 127.0.0.1"}]);
        var edges = new vis.DataSet([{"from": "MANALI-IDEAPADF$", "to": "nan"}, {"from": "manalishanbhag@outlook.com", "to": "nan"}, {"from": "manalishanbhag@outlook.com", "to": "127.0.0.1"}, {"from": "MANALI-IDEAPADF$", "to": "127.0.0.1"}]);

        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };
        var options = {
            nodes: {
                shape: 'dot',
                size: 16,
                font: { size: 14, color: '#ffffff' },
                borderWidth: 2
            },
            edges: {
                width: 1,
                color: { color: '#475569', highlight: '#38bdf8' },
                smooth: { type: 'continuous' }
            },
            physics: {
                stabilization: false,
                barnesHut: {
                    gravitationalConstant: -8000,
                    springConstant: 0.04,
                    springLength: 95
                }
            }
        };
        var network = new vis.Network(container, data, options);
    </script>
</body>
</html>
